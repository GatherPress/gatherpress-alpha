name: Version Bump

# Manually-triggered lockstep version bump: rewrites the `Version:` header in
# gatherpress-alpha.php and opens a `version-X.Y.Z` PR against main — the
# gatherpress-alpha half of the release train
# (GatherPress/gatherpress#1921).
#
# Trigger it from the Actions tab, with
# `gh workflow run version-bump.yml -f version=X.Y.Z`, or let the core
# repo's Version Bump workflow dispatch it automatically (that requires a
# `GATHERPRESS_ALPHA_TOKEN` secret configured in the core repo).
#
# The commit is created via the GraphQL API (createCommitOnBranch), so it is
# GitHub-signed. The PR is intentionally NOT auto-merged — the release
# manager reviews and merges it alongside the core version PR.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (X.Y.Z or X.Y.Z-alpha.N / -beta.N / -rc.N)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump to ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "::error::'${VERSION}' is not a valid version (X.Y.Z or X.Y.Z-alpha.N/-beta.N/-rc.N)."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update the plugin version header
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i -E "s/^( \* Version:[[:space:]]+).+$/\1${VERSION}/" gatherpress-alpha.php

          if ! grep -qE "^ \* Version:[[:space:]]+${VERSION//./\\.}$" gatherpress-alpha.php; then
            echo "::error::Failed to rewrite the Version header in gatherpress-alpha.php."
            exit 1
          fi

          if git diff --quiet gatherpress-alpha.php; then
            echo "::error::gatherpress-alpha.php is already at ${VERSION} — nothing to bump."
            exit 1
          fi

      - name: Open the version PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          branch="version-${VERSION}"
          head_sha=$(git rev-parse HEAD)

          # Branch off main via the API, then commit the header change with
          # createCommitOnBranch so GitHub signs the commit.
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${branch}" -f sha="${head_sha}" > /dev/null

          jq -n \
            --arg query 'mutation ($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }' \
            --arg repo "${REPO}" \
            --arg branch "${branch}" \
            --arg oid "${head_sha}" \
            --arg headline "Start ${VERSION}" \
            --arg contents "$(base64 -w0 gatherpress-alpha.php)" \
            '{query: $query, variables: {input: {branch: {repositoryNameWithOwner: $repo, branchName: $branch}, expectedHeadOid: $oid, message: {headline: $headline}, fileChanges: {additions: [{path: "gatherpress-alpha.php", contents: $contents}]}}}}' \
            > /tmp/bump-commit.json

          gh api graphql --input /tmp/bump-commit.json > /dev/null

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "Start ${VERSION}" \
            --body "Lockstep version sync with GatherPress core ${VERSION} (the plugin refuses to run on a version mismatch). Generated by the Version Bump workflow.

          See docs/release-process.md for the full release flow." \
            --label "Skip Changelog"
