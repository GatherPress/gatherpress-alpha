name: Release

# Tag-driven release automation.
#
# Pushing a tag like `0.34.0` cuts a stable release: distro zip is built and
# attached to a GitHub Release, the .github/changelog/* entries get rolled up
# into CHANGELOG.md under a new version header (and auto-PR'd back to main
# for review).
#
# Pushing a tag like `0.34.0-alpha.1`, `-beta.1`, or `-rc.1` cuts a pre-release:
# the same rolled-up changelog body that would ship at stable release shows
# up on a GitHub Pre-Release (marked NOT-latest), but the rollup is computed
# in an ephemeral checkout — no commit, no PR, no entry files deleted.
#
# Unlike the main gatherpress workflow, this one does NOT deploy to
# wordpress.org — gatherpress-alpha is a developer companion plugin
# distributed only via GitHub releases until the 1.0.0 milestone.
#
# The workflow can also be dispatched with a version input instead of
# pushing a tag (GatherPress/gatherpress#1921): it verifies the version
# matches the `Version:` header on main and the release step creates the
# tag itself. The core repo's Release workflow uses this to cut the
# lockstep alpha release automatically when a cross-repo token is
# configured there.
#
# Release-manager docs: docs/release-process.md.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release from main (must match the Version header in gatherpress-alpha.php)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Classify the tag (or dispatch input) so downstream jobs know which path
  # to take.
  prepare:
    name: Prepare release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.context.outputs.version }}
      is_prerelease: ${{ steps.context.outputs.is_prerelease }}
    steps:
      - name: Checkout main (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Classify tag
        id: context
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION}"

            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
              echo "::error::'${version}' is not a valid version (X.Y.Z or X.Y.Z-alpha.N/-beta.N/-rc.N)."
              exit 1
            fi

            # The release step creates the tag at this run's HEAD of main, so
            # refuse to cut a release whose version doesn't match the plugin
            # header — that means the version PR hasn't been merged yet.
            header=$(grep -E '^ \* Version:' gatherpress-alpha.php | awk '{print $NF}')

            if [[ "${header}" != "${version}" ]]; then
              echo "::error::Version header in gatherpress-alpha.php is '${header}', not '${version}'. Merge the version PR first."
              exit 1
            fi
          else
            version="${GITHUB_REF_NAME}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

          # Pre-release suffix detection: alpha.N, beta.N, rc.N (per SemVer).
          if [[ "${version}" =~ -(alpha|beta|rc)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Version ${version} is a pre-release."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Version ${version} is a stable release."
          fi

  # Always runs: aggregate `.github/changelog/*` into a new [X.Y.Z] section
  # and capture the section text as the release body. For stable tags we
  # additionally commit the rollup back via an auto-PR; for pre-releases the
  # working-dir changes evaporate when the job ends, so the entry files stay
  # intact for the eventual stable release.
  rollup:
    name: Roll up changelog
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_body: ${{ steps.extract.outputs.release_body }}
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Composer install
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1
        run: composer install --optimize-autoloader --prefer-dist

      - name: Roll up changelog entries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # On pre-releases this modifies the ephemeral working dir; the
          # changes never get pushed because the commit step below is gated
          # on the stable path.
          vendor/bin/changelogger write \
            --use-version="${VERSION}" \
            --release-date="$(date +%Y-%m-%d)" \
            --add-pr-num \
            --deduplicate=-1 \
            --yes

      - name: Extract release body from CHANGELOG.md
        id: extract
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          # Single-pass capture between the new [X.Y.Z] header and the next
          # ## header. Suppresses leading blanks until first non-blank, buffers
          # trailing blanks so they never flush.
          section="$(awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            /^## \[/ && capture { exit }
            capture {
              if ($0 ~ /[^[:space:]]/) {
                seen = 1
                if (buffered) { printf "%s", buffered; buffered = "" }
                print
              } else if (seen) {
                buffered = buffered $0 ORS
              }
            }
          ' CHANGELOG.md)"

          if [[ -z "$section" ]]; then
            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              section="_No changelog entries queued yet for this pre-release._"
            else
              echo "::error::Rolled-up CHANGELOG.md does not contain a [${VERSION}] section. Did the changelogger write command succeed? .github/changelog/ may have been empty at tag time."
              exit 1
            fi
          fi

          {
            echo "release_body<<EOF_BODY"
            echo "$section"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR with rolled-up changelog (stable only)
        if: needs.prepare.outputs.is_prerelease == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          branch="release/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${branch}"
          git add CHANGELOG.md .github/changelog/
          git commit -m "Roll up changelog for ${VERSION}"
          git push origin "${branch}"

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "Roll up changelog for ${VERSION}" \
            --body "Automated rollup of \`.github/changelog/*\` entries into \`CHANGELOG.md\` as part of the ${VERSION} release. Merge after confirming the rendered release body at https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION} looks right." \
            --label "Skip Changelog"

  # Build the distro zip manually instead of relying on wp-scripts plugin-zip:
  # wp-scripts in this repo produces a flat zip with files at root (no wrapping
  # `gatherpress-alpha/` directory), which causes WordPress's plugin installer
  # to fall back to the outer zip filename — meaning users end up with a
  # `gatherpress-alpha.0.34.0/` plugin folder instead of `gatherpress-alpha/`,
  # breaking the version-match guard against core GatherPress.
  #
  # Manual construction is bulletproof and matches the structure WordPress
  # expects: outer file `gatherpress-alpha.<version>.zip`, inner wrapping
  # directory `gatherpress-alpha/`, plugin files inside.
  build:
    name: Build distro zip
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Build distro zip
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          PLUGIN_SLUG="gatherpress-alpha"
          ZIP_NAME="${PLUGIN_SLUG}.${VERSION}.zip"

          # Stage just the distribution files into a single wrapper directory.
          # Anything that's developer-facing (CI configs, lockfiles, dev docs,
          # vendor/, etc.) is intentionally left out — see .distignore for the
          # human-readable list that this mirrors.
          mkdir -p "/tmp/package/${PLUGIN_SLUG}"
          cp gatherpress-alpha.php "/tmp/package/${PLUGIN_SLUG}/"
          cp uninstall.php "/tmp/package/${PLUGIN_SLUG}/"
          cp SECURITY.md "/tmp/package/${PLUGIN_SLUG}/"
          cp -r includes "/tmp/package/${PLUGIN_SLUG}/"
          # public/ is optional: it only ever held front-end assets and may be
          # absent (e.g. after the injected fonts dir was removed). Guard the
          # copy so the build doesn't fail when there are no public assets.
          [ -d public ] && cp -r public "/tmp/package/${PLUGIN_SLUG}/" || true

          # Zip the wrapper directory so the archive has the expected layout:
          # gatherpress-alpha/                   ← top-level entry inside the zip
          # gatherpress-alpha/gatherpress-alpha.php
          # gatherpress-alpha/includes/...
          # gatherpress-alpha/public/...
          # gatherpress-alpha/SECURITY.md
          # gatherpress-alpha/uninstall.php
          cd /tmp/package
          zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "${PLUGIN_SLUG}/"
          cd "${GITHUB_WORKSPACE}"

          # Sanity-check: the zip should have a wrapping directory, not files
          # at root. Fail loudly if WordPress would mis-install this.
          if unzip -l "${ZIP_NAME}" | awk 'NR>3 && NF==4 && $4!="" {n=split($4,a,"/"); if (a[1]!="'"${PLUGIN_SLUG}"'") exit 1}'; then
            echo "Zip layout OK — all entries are under ${PLUGIN_SLUG}/."
          else
            echo "::error::Zip ${ZIP_NAME} has entries outside the ${PLUGIN_SLUG}/ wrapper. WordPress would mis-install this."
            unzip -l "${ZIP_NAME}" | head -20
            exit 1
          fi

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: distro-zip
          path: gatherpress-alpha.${{ needs.prepare.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 7

  # Create the GitHub Release (or Pre-Release) with the zip attached and the
  # rolled-up changelog section as the body.
  release:
    name: Create GitHub release
    needs: [prepare, build, rollup]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          # On a workflow_dispatch run the tag does not exist yet; the action
          # creates it at this commit (main HEAD at dispatch time). Tags
          # created with GITHUB_TOKEN do not re-trigger this workflow's
          # push-tag path, so there is no double run.
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.version }}
          body: ${{ needs.rollup.outputs.release_body }}
          files: gatherpress-alpha.${{ needs.prepare.outputs.version }}.zip
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'false' && 'true' || 'false' }}
          fail_on_unmatched_files: true
